k: 10  # target number of clusters for CSS stage
u: 5   # minimum factor count required before CoE expansion
assets: ["000905.SH"]  # 项目统一资产列表（RIC/CoE/相关性筛选/日历锚点默认均使用）

css:
  n_select: 6  # CSS 最终选入 prompt 的多样化因子数量
  similarity_metric: "spearman"  # 预留：相似度类型（当前聚类实现固定为 KMeans 标准化空间）
  cluster_window_mode: "train"  # CSS 聚类窗口: train|valid|full|custom
  cluster_start_date: null  # 仅 cluster_window_mode=custom 时生效（可单边）
  cluster_end_date: null  # 仅 cluster_window_mode=custom 时生效（可单边）

coe:
  max_depth: 5  # CoE 单条经验链最大长度
  min_rankic: 0.05  # 经验链入选最小 |RIC| 门槛
  prompt_chains: 6  # prompt 中最多展示的 CoE 链数量
  # 提示中附带哪些指标（可选: ric, ic, icir）；留空/缺失则展示全部
  prompt_metrics: ["ric"]
  prompt_expr_chars: 0  # CoE 表达式截断长度；<=0 表示不截断
  ric_window_mode: "train"  # CoE RIC 评分窗口: train|valid|full|custom
  ric_start_date: null  # 仅 ric_window_mode=custom 时生效（可单边）
  ric_end_date: null  # 仅 ric_window_mode=custom 时生效（可单边）
  ric_asset_mode: "global"  # CoE/CSS 共用 RIC 资产来源: global|custom
  ric_assets: []  # 仅 ric_asset_mode=custom 时生效

ric:
  min_obs: 100  # 单资产-因子组合最小有效样本数

windows:
  train:
    start_date: "2005-01-01"  # 训练集时间段起始（含）；默认用于 CoE/CSS/筛选 train
    end_date: "2009-12-31"  # 训练集时间段结束（含）
  valid:
    start_date: "2010-01-01"  # 验证集时间段起始（含）；默认用于筛选 valid
    end_date: "2011-12-31"  # 验证集时间段结束（含）

run:
  use_css: true
  use_coe: true

workflow:
  iterations: 1000  # workflow 总迭代次数

selection:
  min_corr_obs: 1000  # 相关性计算最小重叠样本数
  require_full_asset_coverage: true  # RIC 是否要求覆盖全部目标资产
  log_topk: 3  # 日志展示每个阶段 TopK 相关性摘要

  scope:
    asset_mode: "global"  # 筛选指标资产来源: global|custom
    assets: []  # 仅 asset_mode=custom 时生效
    train_window_mode: "train"  # train 相关性窗口: train|valid|full|custom
    valid_window_mode: "valid"  # valid 相关性窗口: train|valid|full|custom

    train_start_date: null  # 当 train_window_mode=custom 时必填
    train_end_date: null  # 当 train_window_mode=custom 时必填
    valid_start_date: null  # 当 valid_window_mode=custom 时必填
    valid_end_date: null  # 当 valid_window_mode=custom 时必填

  criteria:
    train_min_abs_ric:
      enabled: true
      threshold: 0.08
    train_max_abs_corr_base:
      enabled: true
      threshold: 0.95
    train_max_abs_corr_old_llm:
      enabled: true
      threshold: 0.95
    train_max_abs_corr_new_llm:
      enabled: true
      threshold: 0.95
    valid_min_abs_ric:
      enabled: false
      threshold: 0.0
    valid_max_abs_corr_base:
      enabled: false
      threshold: 0.95
    valid_max_abs_corr_old_llm:
      enabled: false
      threshold: 0.95
    valid_max_abs_corr_new_llm:
      enabled: false
      threshold: 0.95
    max_operator_count:
      enabled: true
      threshold: 15
    max_nesting_depth:
      enabled: true
      threshold: 4

base_catalog:
  selected_sources: ["alpha101", "alpha158"]  # 运行时基础因子源选择（可选: alpha101, alpha158）
  include_llm_library_in_base: true  # 是否将通过筛选的 LLM 正式库并入 base（true/false）

backtest:
  calendar_anchor_symbol: null  # 兼容旧键；默认将优先使用全局 assets 的首个资产作为交易日锚点

paths:
  market_data: "./data/fof_price_updating_intact.parquet"  # 行情原始数据（OHLCV）
  base_alpha101_cache: "./data/factor_cache_new/alpha101.yaml"  # Alpha101 基础因子源
  base_alpha158_cache: "./data/factor_cache_new/alpha158.yaml"  # Alpha158 基础因子源

  base_factor_cache_resolved: "./tmp/base_factor_cache_resolved.yaml"  # 运行时合并后的 base 因子缓存（由 base_catalog 控制）

  llm_factor_cache: "./data/factor_cache_new/LLM_factors.yaml"  # LLM 因子缓存库（新生成因子）
  llm_factor_library: "./data/factor_cache_new/LLM_library.yaml"  # LLM 正式入库库（通过筛选后落盘）
  factor_outputs: "./data/factor_values"  # 预留：因子值通用输出目录
  prompts_dir: "./prompts"  # 预留：提示词模板目录
  output_dir: "./artifacts"  # 预留：通用产物目录
  factor_base_parquet: "./factor_value_prepared/data/factors/dsl_factors_new.parquet"  # 基础因子值长表（来自 base_catalog 解析结果）

  factor_ric_base: "./factor_value_prepared/data/factors/factor_ric.csv"  # 基础库 RIC（由 utils/ric_engine.py 生成，供 CoE/CSS 使用）
  factor_ric_llm: "./tmp/llm_factor_ric.csv"  # LLM 新因子训练集 RIC（workflow 每轮覆盖输出）
  factor_ric_llm_valid: "./tmp/llm_factor_ric_valid.csv"  # LLM 新因子验证集 RIC（workflow 每轮覆盖输出）

  llm_output: "./tmp/llm-factor.yaml"  # LLM 原始输出落盘（本轮表达式）
  llm_factor_parquet: "./scripts/LLM_factors/dsl_LLM_factors_new.parquet"  # LLM 因子值长表输出
  base_factor_dir: "./data/base_factors"  # 基础因子值目录（用于相关性筛选）

  corr_output_new_vs_base: "./tmp/new_llm_vs_base_corr.csv"  # 本轮新 LLM vs base（训练集窗口）
  corr_output_new_vs_old_llm: "./tmp/new_llm_vs_old_llm_corr.csv"  # 本轮新 LLM vs 历史 LLM（训练集窗口）
  corr_output_new_vs_new_llm: "./tmp/new_llm_vs_new_llm_corr.csv"  # 本轮新 LLM 两两相关（训练集窗口）
  corr_output_valid_new_vs_base: "./tmp/new_llm_vs_base_corr_valid.csv"  # 本轮新 LLM vs base（验证集窗口）
  corr_output_valid_new_vs_old_llm: "./tmp/new_llm_vs_old_llm_corr_valid.csv"  # 本轮新 LLM vs 历史 LLM（验证集窗口）
  corr_output_valid_new_vs_new_llm: "./tmp/new_llm_vs_new_llm_corr_valid.csv"  # 本轮新 LLM 两两相关（验证集窗口）

  factor_success_cases: "./data/memory/factor_success_cases.csv"  # 成功记忆库（通过交集筛选）
  factor_failure_cases: "./data/memory/factor_failure_cases.csv"  # 失败记忆库（未通过交集筛选）

llm:
#  provider: "openai"
#  model: "gpt-5.2"
#  api_key_env: "OPENAI_API_KEY"
  provider: "siliconflow"  # LLM 提供方标识（决定客户端与鉴权方式）
  model: "Pro/deepseek-ai/DeepSeek-V3.2"  # 具体模型名（需与 provider 匹配）
  base_url: "https://api.siliconflow.cn/v1"  # API 基础地址（OpenAI 官方可留空走默认）
  api_key_env: "SiliconFlow_API_KEY"  # 读取 API Key 的环境变量名
  temperature: 1  # 采样温度；越高多样性越强、稳定性越弱
  thinking: "high"  # 推理强度档位（仅对支持该参数的模型生效）
  parallel_calls: 1  # 单轮并发 LLM 请求数（用于提高候选多样性）
  max_new_factors: 15  # 期望单轮生成的新因子上限
  max_reference_factors: 5  # Prompt 中引用的示例因子上限（CSS/CoE）
  instructions_path: "./prompts/alpha_prompt_template.txt"  # 提示词模板路径


  operator_whitelist:  # DSL 允许算子白名单（校验与提示均依赖此列表）
    [
      #"RANK",
      "DELTA",
      "DELAY",
      "TS_MEAN",
      "TS_SUM",
      "TS_STDDEV",
      "TS_MIN",
      "TS_MAX",
      "TS_PRODUCT",
      "TS_ARGMAX",
      "TS_ARGMIN",
      "TS_RANK",
      "CORREL",
      "COVAR",
      "SIGN",
      "ABS",
      "DECAY_LINEAR",
      #"SCALE",
      "IF",
      "AND",
      "OR",
      "NOT",
      "GT",
      "GE",
      "LT",
      "LE",
      "EQ",
      "MAX",
      "MIN",
      "LOG",
      "EXP",
      "POW",
      "REPLACE_NAN_INF",
      "ADV",
      "SAFE_DIV",
      "CLIP",
      "EMA",
      "EXP_MOVING_AVG",
      "FAST_TS_SUM",
      "TS_QUANTILE",
      "TS_KURT",
      "TS_SKEW",
      "TS_MAXDRAWDOWN",
      "TS_LINEAR_REGRESSION_R2",
      "TS_LINEAR_REGRESSION_SLOPE",
      "TS_LINEAR_REGRESSION_RESI",
      #"DIFF_WITH_WEIGHTED_SUM",
    ]
  deny_fields: []  # 禁止 LLM 使用的字段黑名单（例如 ["VWAP"]）
logging:
  level: "INFO"
  log_file: "./logs/fama.log"
compute:
  use_kunquant: true
  threads: 4
  layout: "TS"
  kun_batch_size: 500  # KunQuant 默认编译批大小（未显式传 batch_size 时生效）
